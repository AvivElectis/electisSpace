name: Deploy to Ubuntu Server

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/workflows/release.yml'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GH_PAT
          command_timeout: 20m
          script: |
            set -e
            cd /opt/electisSpace

            echo "=== Pulling latest code ==="
            git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/AvivElectis/electisSpace.git"
            git pull origin main

            echo "=== Building app containers ==="
            docker compose -f docker-compose.infra.yml -f docker-compose.app.yml build

            echo "=== Starting Redis ==="
            docker compose -f docker-compose.infra.yml up -d redis

            echo "=== Backing up database before migrations ==="
            BACKUP_DIR="/opt/electisSpace/backups"
            mkdir -p "$BACKUP_DIR"
            BACKUP_FILE="$BACKUP_DIR/pre-deploy-$(date +%Y%m%d-%H%M%S).sql.gz"
            docker exec global-postgres pg_dump -U postgres electisspace_prod | gzip > "$BACKUP_FILE"
            echo "Backup saved to $BACKUP_FILE"
            # Keep only the last 5 backups
            ls -t "$BACKUP_DIR"/pre-deploy-*.sql.gz 2>/dev/null | tail -n +6 | xargs -r rm

            echo "=== Running migrations ==="
            docker compose -f docker-compose.infra.yml -f docker-compose.app.yml run --rm -T server npx prisma migrate deploy

            echo "=== Starting core services ==="
            docker compose -f docker-compose.infra.yml -f docker-compose.app.yml up -d --remove-orphans server client

            echo "=== Health check ==="
            sleep 10
            curl -f http://localhost:3071/health || (echo "Health check failed!" && exit 1)

            echo "=== Deployment complete ==="
            docker compose -f docker-compose.infra.yml -f docker-compose.app.yml ps
