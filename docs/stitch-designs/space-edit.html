<!-- Space ID (Read Only) -->

<option selected="" value="conference">Conference Room</option>
<option value="hotdesk">Hotdesk</option>
</select>
<span class="material-symbols-outlined absolute right-4 bottom-3 text-on-surface-variant pointer-events-none" data-icon="arrow_drop_down">arrow_drop_down</span>
</div>

<label class="absolute left-4 top-2 text-xs font-medium text-on-surface-variant">Internal Code</label>
<input class="w-full pt-6 pb-2 px-4 bg-surface-container border-b-2 border-outline-variant focus:border-primary text-on-surface outline-none rounded-t-lg" type="text" value="CR-402-DELTA"/>

</div>
