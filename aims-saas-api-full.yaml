          in: query
          description: Label Battery Status
          schema:
            type: string
            nullable: false
            enum:
              - GOOD
              - BAD
          required: false
        - name: signal
          in: query
          description: Label Signal Strength
          schema:
            type: string
            nullable: false
            enum:
              - EXCELLENT
              - GOOD
              - BAD
          required: false
