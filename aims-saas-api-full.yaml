          in: query
          description: Current Page Number like 0, 1, 2 etc
          example: 0
          required: false
          schema:
            type: string
        - name: size
          in: query
          description: How many rows to be returned at once like 10, 20, 30...500 etc
          example: 10
          required: false
          schema:
            type: string
        - name: sort
          in: query
          description: Sort Column along with sort order asc or desc
          schema:
            type: string
            nullable: false
            enum:
