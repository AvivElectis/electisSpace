              type: string
              example: Bearer
            expires_in:
              type: integer
              example: 3600
            refresh_token:
              type: string
              example: "eyJraWQiOiJjcGltY29yZV8wOTI1MjAxNSIsInZlciI6IjEuMCIsInppcCI6IkRlZmxhdGUiLCJzZXIiOiIxLjAifQ..E9kRC8du..."
              description: Pass refresh_token value from generated token info in post body to refresh the token

