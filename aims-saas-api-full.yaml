      properties:
        refresh_token:
          type: string
          example: "eyJraWQiOiJJcGlYY29yZV8wOTI1MjAxNSIsInZlciI6IjEuMCIsInppcCI6IkRlZmxhdGUiLCJzZXIiOiIxLjAifQ..Yx5Ix0ye..."

    v3RefreshTokenResponse:
      type: object
      properties:
        responseCode:
          type: string
          description: HTTP response code as string
          example: "200"
        responseMessage:
          type: object
          properties:
            success:
              type: boolean
              description: Indicates if the token generation was successful
              example: true
            message:
              type: string
              description: Status message describing the result
              example: Tokens generated successfully from refresh token
            tokens:
              type: object
              properties:
                access_token:
                  type: string
                  description: JWT access token for API authentication
                  example: eyJraWQiOiJJcGlYY29yZV8wOTI1MjAxNSIsInZlciI6IjEuMCIsInppcCI6IkRlZmxhdGUiLCJzZXIiOiIxLjAifQ..
                id_token:
                  type: string
                  description: JWT ID token containing user identity information
                  example: eyJraWQiOiJJcGlYY29yZV8wOTI1MjAxNSIsInZlciI6IjEuMCIsInppcCI6IkRlZmxhdGUiLCJzZXIiOiIxLjAifQ..
                token_type:
                  type: string
                  description: "Type of token (typically \"Bearer\")"
                  example: Bearer
                not_before:
                  type: integer
                  format: int64
                  description: Unix timestamp indicating when the token becomes valid
                  example: 1765963732
                expires_in:
                  type: integer
                  description: Number of seconds until the access token expires
                  example: 3600
                expires_on:
                  type: integer
                  format: int64
                  description: Unix timestamp when the access token expires
                  example: 1765967332
                id_token_expires_in:
                  type: integer
                  description: Number of seconds until the ID token expires
                  example: 3600
                refresh_token:
                  type: string
                  description: New refresh token for obtaining future access tokens
                  example: eyJraWQiOiJJcGlYY29yZV8wOTI1MjAxNSIsInZlciI6IjEuMCIsInppcCI6IkRlZmxhdGUiLCJzZXIiOiIxLjAifQ..
                refresh_token_expires_in:
                  type: integer
                  description: Number of seconds until the refresh token expires
                  example: 1209600
            accessTokenExpiration:
              type: object
              properties:
                expiresAt:
                  type: string
                  format: date-time
                  description: ISO 8601 timestamp when the access token expires
                  example: 2025-12-17T10:28:52.000Z
                timeRemaining:
                  type: integer
                  description: Milliseconds remaining until token expiration
                  example: 3599112
                isExpired:
                  type: boolean
                  description: Indicates if the token is currently expired
                  example: false
                expiresInSeconds:
                  type: integer
                  description: Seconds remaining until token expiration
                  example: 3599
            refreshTokenRotated:
              type: boolean
              description: Indicates if the refresh token was rotated
              example: true
            info:
              type: object
              properties:
                accessTokenReceived:
                  type: boolean
                  description: Confirms access token was successfully received
                  example: true
                refreshTokenRotated:
                  type: boolean
                  description: Confirms refresh token was rotated/renewed
                  example: true
                expiresIn:
                  type: integer
                  description: Token expiration time in seconds
                  example: 3600

