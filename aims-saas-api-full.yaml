  description: >-
    Welcome to AIMS SaaS Interface. These APIs to access AIMS SaaS, which can get information about Labels, Articles and many more.
  license:
    name: Token Generation
    url: /c1/common/token/  || /common/token/
  contact:
    name: See more at SoluM
    url: https://solumesl.com/
  version: "2.x.x.xxxx"

externalDocs:
  description: API Web Docs
  url: /apidocs/

servers:
### There are 2 clusters for Aims SaaS - /c1/common and /common
  - url: /c1/common || /common

