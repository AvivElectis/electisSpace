<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="icon.ico" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0D47A1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="electis Space" />
    <link rel="apple-touch-icon" href="logos/AppIcon.png" />
    <!-- Google Fonts: Assistant for Hebrew -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>electisSpace</title>
    <!-- View Transitions API animations for native page navigation -->
    <style>
      ::view-transition-old(root) { animation: vt-slide-out 250ms ease-out; }
      ::view-transition-new(root) { animation: vt-slide-in 250ms ease-out; }
      @keyframes vt-slide-in { from { transform: translateX(30%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      @keyframes vt-slide-out { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-30%); opacity: 0; } }
      [dir="rtl"] ::view-transition-old(root) { animation: vt-slide-out-rtl 250ms ease-out; }
      [dir="rtl"] ::view-transition-new(root) { animation: vt-slide-in-rtl 250ms ease-out; }
      @keyframes vt-slide-in-rtl { from { transform: translateX(-30%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      @keyframes vt-slide-out-rtl { from { transform: translateX(0); opacity: 1; } to { transform: translateX(30%); opacity: 0; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
